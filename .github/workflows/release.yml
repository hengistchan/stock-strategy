name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: python -m pip install build
      - name: Verify tag matches package version
        run: python backend/scripts/verify_release_version.py "$GITHUB_REF_NAME"
      - name: Build Python distributions
        run: python -m build backend
      - name: Verify wheel contains the production frontend
        run: python backend/scripts/verify_wheel.py
      - name: Generate checksums
        run: cd backend/dist && sha256sum * > SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" backend/dist/*
          --verify-tag
          --title "Strategy Lab $GITHUB_REF_NAME"
          --generate-notes
